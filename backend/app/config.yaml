# config.yaml — role→model matrix + thresholds. All roles route through MeshAPI
# (OpenAI-compatible). Model IDs: https://developers.meshapi.ai/docs/introduction/available-models
roles:
  normalizer:   { provider: meshapi, model: openai/gpt-oss-120b, temp: 0.0, include_reasoning: false }
  verifier:     { provider: meshapi, model: openai/gpt-oss-120b, temp: 0.1 }
  synthesizer:  { provider: meshapi, model: openai/gpt-oss-120b, temp: 0.2, include_reasoning: false }
  # ponytail: gpt-oss-120b is text-only — OCR needs a vision model.
  # google/gemma-3-4b-it is the cheapest MeshAPI model that accepts image input
  # ($0.04/$0.08 per 1M prompt/completion tokens); verified working via base64 image_url.
  ocr:          { provider: meshapi, model: google/gemma-3-4b-it, temp: 0.0 }
default_provider: meshapi
providers:
  meshapi:
    base_url: https://api.meshapi.ai/v1
    auth_env: MESH_API_KEY
    fallback_model: openai/gpt-oss-120b
    rate_limit: 20
thresholds:
  max_verify_steps: 6
  verify_budget_s: 75
  max_autofetch: 5
  max_results: 5
  fetch_truncate_chars: 3000
  temporal_slack_days: 3
