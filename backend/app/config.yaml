# config.yaml — role→model matrix + thresholds. All models via NVIDIA NIM.
# IDs are real NIM catalog IDs; re-pin from build.nvidia.com/models at build time.
roles:
  embeddings:   { model: baai/bge-m3, dims: 1024 }              # multilingual, strong on Indic
  normalizer:   { model: meta/llama-3.1-8b-instruct, temp: 0.0 }
  investigators:                       # 2 DIFFERENT families (MVP), run in parallel
    - { model: meta/llama-3.3-70b-instruct,      tools: [web_search, factcheck_search, numeric_check] }
    - { model: qwen/qwen3-next-80b-a3b-instruct, tools: [web_search, factcheck_search, source_credibility] }
  fastpath_jury:                       # 3 independent verdict voters, different families
    [ meta/llama-3.3-70b-instruct, deepseek-ai/deepseek-v4-flash, nvidia/llama-3.3-nemotron-super-49b-v1.5 ]
  prosecutor:   { model: deepseek-ai/deepseek-v4-pro,   temp: 0.7 }
  defense:      { model: openai/gpt-oss-120b,           temp: 0.7 }
  judge:        { model: moonshotai/kimi-k2-thinking,   temp: 0.1 }
  synthesizer:  { model: sarvamai/sarvam-m,             temp: 0.2 }
provider:
  base_url: https://integrate.api.nvidia.com/v1        # OpenAI-compatible
  auth_env: NIM_API_KEY
  fallback_model: meta/llama-3.1-8b-instruct
  rate_limit: 40                       # req/min, free-tier ceiling → global semaphore
thresholds:
  agreement_theta: 0.75
  cache_similarity: 0.92
  max_rebuttal_rounds: 2
  max_tool_calls_per_investigator: 3
