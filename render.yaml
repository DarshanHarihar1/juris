# Render Blueprint — Juris backend: Web Service (FastAPI, runs the job queue
# in-process) + SearXNG meta-search. Auto-deploy on push to main. Set
# NIM_API_KEY and DATABASE_URL in the
# Render dashboard (sync: false = secret, entered once per service).
services:
  - type: web
    name: juris-web
    runtime: python
    plan: free                       # switch to starter ($7) for demo day (no cold start)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Pin Python: Render's default (3.14) has no prebuilt pydantic-core wheel,
      # so pip tries to compile it from source and fails on the read-only build FS.
      # 3.12 has wheels for every pinned dep. Bump when the stack ships cp314 wheels.
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: NIM_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_FACTCHECK_API_KEY
        sync: false
      # WhatsApp (Phase 7). Meta Cloud API is the default provider; set WHATSAPP_PROVIDER=twilio
      # to fall back to the old sandbox. All creds secret, set once in the Render dashboard.
      # WA_HASH_SALT MUST stay constant (it keys the per-user hash).
      - key: WHATSAPP_PROVIDER          # "meta" (default) | "twilio"
        value: meta
      # --- Meta Cloud API (graph.facebook.com) ---
      - key: WHATSAPP_ACCESS_TOKEN      # permanent system-user token
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID   # sender phone number id (not the display number)
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN      # your choice; must match the value entered in the Meta webhook config
        sync: false
      - key: WHATSAPP_APP_SECRET        # app secret — validates X-Hub-Signature-256 on inbound POSTs
        sync: false
      # --- Twilio sandbox (only used when WHATSAPP_PROVIDER=twilio) ---
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: WA_HASH_SALT
        sync: false
      - key: SEARXNG_URL              # internal URL of the searxng service
        fromService: { name: juris-searxng, type: web, property: hostport }

  # ponytail: no separate worker service — free plan has no worker dyno, so the
  # web service runs the queue loop in-process (see app/main.py lifespan).
  # Add a `type: worker` on Starter+ if serving and processing must scale apart.

  # Meta-search. OSS, zero per-query cost (LLD §1/§13). Built from a thin Dockerfile
  # that ships searxng/settings.yml — the base image ignores env-var setting overrides,
  # so JSON output + limiter-off must come from a baked-in settings.yml.
  # ponytail: public on free plan (no pserv on free tier); add auth if exposure is a concern.
  - type: web
    name: juris-searxng
    runtime: docker
    plan: free
    rootDir: searxng
    dockerfilePath: ./Dockerfile
