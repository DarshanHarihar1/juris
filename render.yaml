# Render Blueprint — Juris backend: Web Service (FastAPI) + Background Worker.
# Both auto-deploy on push to main. Set NIM_API_KEY and DATABASE_URL in the
# Render dashboard (sync: false = secret, entered once per service).
services:
  - type: web
    name: juris-web
    runtime: python
    plan: free                       # switch to starter ($7) for demo day (no cold start)
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NIM_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_FACTCHECK_API_KEY
        sync: false
      - key: SEARXNG_URL              # internal URL of the private searxng service
        fromService: { name: juris-searxng, type: pserv, property: hostport }

  - type: worker
    name: juris-worker
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.worker
    autoDeploy: true
    envVars:
      - key: NIM_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_FACTCHECK_API_KEY
        sync: false
      - key: SEARXNG_URL
        fromService: { name: juris-searxng, type: pserv, property: hostport }

  # Private meta-search (backend-only). OSS, zero per-query cost (LLD §1/§13).
  - type: pserv
    name: juris-searxng
    runtime: image
    plan: free
    image: { url: searxng/searxng:latest }
    envVars:
      - key: SEARXNG_SETTINGS__SEARCH__FORMATS   # enable JSON output for the wrapper
        value: '["html","json"]'
