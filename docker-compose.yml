# Local dev — web + worker against the Supabase Postgres (set DATABASE_URL/NIM_API_KEY
# in a root .env). Mirrors the two Render services. Not used in production deploy.
services:
  web:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    env_file: .env

  worker:
    build: ./backend
    command: python -m app.worker
    env_file: .env
